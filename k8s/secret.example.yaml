# Secret template — do not commit real values.
# Create this secret directly on the cluster:
#
#   kubectl -n claude create secret generic router-mcp \
#     --from-literal=ROUTER_BASE_URL=https://192.168.1.1 \
#     --from-literal=ROUTER_USERNAME=admin \
#     --from-literal=ROUTER_PASSWORD=<password> \
#     --from-literal=READ_API_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))") \
#     --from-literal=ROUTINE_API_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))") \
#     --from-literal=DANGEROUS_API_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))")
#
# If the router supports multiple accounts (one per tier), also set:
#   --from-literal=ROUTER_READ_USERNAME=<user>
#   --from-literal=ROUTER_READ_PASSWORD=<password>
#   --from-literal=ROUTER_ROUTINE_USERNAME=<user>
#   --from-literal=ROUTER_ROUTINE_PASSWORD=<password>
# These override ROUTER_USERNAME/PASSWORD for the respective tiers.
# The dangerous tier always uses the admin account.
#
# Keep the three API keys in your Claude Code settings (one per MCP server entry).
apiVersion: v1
kind: Secret
metadata:
  name: router-mcp
  namespace: claude-router-mcp
type: Opaque
stringData:
  ROUTER_BASE_URL: "https://192.168.1.1"
  ROUTER_USERNAME: ""
  ROUTER_PASSWORD: ""
  READ_API_KEY: ""
  ROUTINE_API_KEY: ""
  DANGEROUS_API_KEY: ""

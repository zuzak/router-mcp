# Grant Claude's ServiceAccount write access in this namespace.
# Binds to the cluster-scoped ClusterRole; the RoleBinding limits
# the scope to claude-router-mcp.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude
  namespace: claude-router-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-namespace-admin
subjects:
  - kind: ServiceAccount
    name: claude
    namespace: claude
